<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">

    <title>Login</title>

    <style>
        body {
            padding-top: 50px;
        }
        .form-container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-title {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-space {
            margin-right: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="form-container">
        <form th:action="@{/login}" method="POST">
            <h3 class="form-title" th:text="'Login'"></h3>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" th:placeholder="Username" class="form-control" required />
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" th:placeholder="Password" class="form-control" required />
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-info btn-space">Login</button>
                <a th:href="@{/register}" class="btn btn-primary">Register</a>
            </div>
            <div th:if="${param.error}" class="alert alert-danger mt-3" role="alert">
                Username or Password is invalid.
            </div>
            <div th:utext="${successMessage}" class="alert alert-success mt-3" role="alert"></div>
        </form>
    </div>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvvhxxDsw0xIM+B07jRM" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.6/umd/popper.min.js" integrity="sha384-wHAi2Fvo5Lc/fPXYF+hEtnyZHnSNE9twXds6LkM39KM3c41mweSwq0MRxaErzs4R" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/js/bootstrap.min.js" integrity="sha384-B0UglyR+6aFw5t1K6LZZ0iO+M86deH9wfyjLrDg2uC29mg2ftW8anD3GP+uaaw9T" crossorigin="anonymous"></script>
</body>
</html>
