<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
    <title>User Dashboard</title>
    <style>
        body {
            padding-top: 50px;
        }
        .header, .footer {
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-group-lg > .btn {
            margin-right: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Welcome to User Dashboard</h2>
        <div class="btn-group btn-group-lg" role="group" aria-label="User Actions">
            <a th:href="@{/user/addBookOffer}" class="btn btn-success">Add Book Offer</a>
            <a th:href="@{/user/myBooks}" class="btn btn-success">My Book List</a>
            <a th:href="@{/user/searchBooks}" class="btn btn-primary">Search Books</a>
        </div>
    </div>
    <h4>My Book Offers</h4>
    <div th:if="${#lists.isEmpty(books)}">
        <p>You have not made any book offers yet.</p>
    </div>
    <div th:if="${!#lists.isEmpty(books)}">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Summary</th>
                    <th>Category</th>
                    <th>Authors</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.summary}"></td>
                    <td th:text="${book.bookCategory.name}"></td>
                    <td>
                        <span th:each="author, stat : ${book.bookAuthors}">
                            <span th:text="${author.name}"></span><span th:if="${!stat.last}">, </span>
                        </span>
                    </td>
                    <td>
                        <a th:href="@{/user/requestingUsers(bookId=${book.bookId})}" class="btn btn-primary btn-sm">View Requests</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="footer">
        <a th:href="@{/}" class="btn btn-primary btn-sm mb-3">Home</a>
        <a th:href="@{/logout}" class="btn btn-danger btn-sm mb-3">Logout</a>
    </div>
</div>
</body>
</html>
