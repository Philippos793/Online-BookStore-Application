<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
    <title>User's Books</title>
    <style>
        body {
            padding-top: 50px;
        }
        .table-container {
            margin: auto;
            width: 90%;
            max-width: 1200px;
        }
        .table th, .table td {
            vertical-align: middle;
        }
        .navbar-brand {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" th:href="@{/user/dashboard}">SocialBookstore</a>
    </nav>
    <div class="table-container">
        <h1 class="text-center mb-4">My Books</h1>
        <div th:if="${#lists.isEmpty(books)}" class="alert alert-info text-center">
            <p>You have not added any books yet.</p>
        </div>
        <div th:if="${!#lists.isEmpty(books)}">
            <table class="table table-striped">
                <thead class="thead-dark">
                    <tr>
                        <th>Title</th>
                        <th>Summary</th>
                        <th>Authors</th>
                        <th>Category</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="book : ${books}">
                        <td th:text="${book.title}">Title</td>
                        <td th:text="${book.summary}">Summary</td>
                        <td>
                            <ul class="list-unstyled mb-0">
                                <li th:each="author : ${book.bookAuthors}" th:text="${author.name}">Author Name</li>
                            </ul>
                        </td>
                        <td th:text="${book.bookCategory != null ? book.bookCategory.name : 'No Category'}">Category</td>
                        <td>
                            <form th:action="@{/user/removeBook}" method="post">
                                <input type="hidden" th:name="bookId" th:value="${book.bookId}" />
                                <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvvhxxDsw0xIM+B07jRM" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.6/umd/popper.min.js" integrity="sha384-wHAi2Fvo5Lc/fPXYF+hEtnyZHnSNE9twXds6LkM39KM3c41mweSwq0MRxaErzs4R" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/js/bootstrap.min.js" integrity="sha384-B0UglyR+6aFw5t1K6LZZ0iO+M86deH9wfyjLrDg2uC29mg2ftW8anD3GP+uaaw9T" crossorigin="anonymous"></script>
</body>
</html>
