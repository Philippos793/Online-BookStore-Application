<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Requesting Users</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2>Users Requesting Your Book</h2>
    <div th:if="${#lists.isEmpty(requestingUsers)}">
        <p>No users found.</p>
    </div>
    <div th:if="${!#lists.isEmpty(requestingUsers)}">
        <table class="table">
            <thead>
            <tr>
                <th>Username</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${requestingUsers}">
                <td th:text="${user.username}"></td>
                <td th:text="${user.fullName}"></td>
                <td th:text="${user.email}"></td>
                <td>
                    <a th:href="@{/user/acceptRequest(bookId=${bookId}, username=${user.username})}" class="btn btn-success">Accept</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
